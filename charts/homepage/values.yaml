homepage:
  serviceAccount:
    create: True
  rbac:
    create: True
  service:
    main:
      type: ClusterIP
      ports:
        http:
          port: 80
          targetPort: 3000
  ingress:
    main:
      enabled: true
      ingressClassName: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web
      hosts:
        - host: homepage.local
          paths:
            - path: /
              pathType: Prefix
  env:
    - name: HOMEPAGE_ALLOWED_HOSTS
      value: "homepage.local,192.168.0.100,localhost"

  config:
    settings:
      title: "K3s Homelab"
      headerStyle: clean
      layout:
        Infrastructure:
          style: row
          columns: 2
        Monitoring:
          style: row
          columns: 2
    
    services:
      - Infrastructure:
          - ArgoCD:
              icon: https://raw.githubusercontent.com/homarr-labs/dashboard-icons/main/png/argo-cd.png
              href: "http://argocd.local"
              description: GitOps Controller
              widget:
                type: argocd
                url: http://argocd-gitops-server.argocd.svc.cluster.local
      - Monitoring:
        - Grafana:
            icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/grafana.png
            href: "http://grafana.local"
            description: Graphs and Metrics
            ping: http://monitoring-grafana.monitoring.svc.cluster.local:80
            widget:
              type: kubernetes
              mode: cluster
              show:
                cpu: true
                memory: true
                storage: false
